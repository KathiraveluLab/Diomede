networks:
  diomede-net:
    driver: bridge

volumes:
  orthanc-us-data:
  orthanc-eu-data:
  orthanc-asia-data:
  orthanc-af-data:
  orthanc-edge-data:


services:
  # Cloud DICOM Node - US East (GCP us-east1 simulation)
  orthanc-us:
    image: orthancteam/orthanc:26.4.2
    container_name: orthanc-us
    ports:
      - "8042:8042"  # REST API (HTTPS)
      - "4242:4242"  # DIMSE-TLS
    env_file: .env
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sed "s/\$${orthanc_user}/$$ORTHANC_USER/g; s/\$${orthanc_password}/$$ORTHANC_PASSWORD/g" \
          /etc/orthanc/orthanc.template.json > /tmp/orthanc.json
        exec Orthanc /tmp/orthanc.json
    volumes:
      - ./config/orthanc/us.template.json:/etc/orthanc/orthanc.template.json:ro
      - ./certs/orthanc-us:/etc/orthanc/certs:ro
      - orthanc-us-data:/var/lib/orthanc/db
    cap_add:
      - NET_ADMIN
    networks:
      - diomede-net
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - |
          import urllib.request, ssl, base64, os
          ctx = ssl.create_default_context(cafile='/etc/orthanc/certs/ca.pem')
          r = urllib.request.Request('https://localhost:8042/system')
          r.add_header('Authorization', 'Basic ' + base64.b64encode(
              (os.environ['ORTHANC_USER'] + ':' + os.environ['ORTHANC_PASSWORD']).encode()
          ).decode())
          urllib.request.urlopen(r, context=ctx)
      interval: 10s
      timeout: 5s
      retries: 3

  # Cloud DICOM Node - EU West (GCP eu-west1 simulation)
  orthanc-eu:
