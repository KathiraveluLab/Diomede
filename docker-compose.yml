  # Cloud DICOM Node - Africa South (GCP af-south1 simulation)
  orthanc-af:
    image: orthancteam/orthanc:26.4.2
    container_name: orthanc-af
    ports:
      - "8045:8042"  # REST API (HTTPS)
      - "4245:4242"  # DIMSE-TLS
    env_file: .env
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sed "s/\$${orthanc_user}/$$ORTHANC_USER/g; s/\$${orthanc_password}/$$ORTHANC_PASSWORD/g" \
          /etc/orthanc/orthanc.template.json > /tmp/orthanc.json
        exec Orthanc /tmp/orthanc.json
    volumes:
      - ./config/orthanc/af.template.json:/etc/orthanc/orthanc.template.json:ro
      - ./certs/orthanc-af:/etc/orthanc/certs:ro
      - orthanc-af-data:/var/lib/orthanc/db
    cap_add:
      - NET_ADMIN
    networks:
      - diomede-net
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - |
          import urllib.request, ssl, base64, os
          ctx = ssl.create_default_context(cafile='/etc/orthanc/certs/ca.pem')
          r = urllib.request.Request('https://localhost:8042/system')
          r.add_header('Authorization', 'Basic ' + base64.b64encode(
              (os.environ['ORTHANC_USER'] + ':' + os.environ['ORTHANC_PASSWORD']).encode()
          ).decode())
          urllib.request.urlopen(r, context=ctx)
      interval: 10s
      timeout: 5s
      retries: 3

  # Orchestrator: FastAPI service with Telemetry Daemon
  orchestrator:
    build:
      context: .
      dockerfile: ./config/orchestrator/Dockerfile
    container_name: orchestrator
    ports:
      - "8000:8000"
      # - "6379:6379"
    env_file: .env
    environment:
      # Telemetry configuration
      REDIS_URL: "redis://localhost:6379"
      POLL_INTERVAL_S: "10"
      REDIS_TTL_S: "30"
      HTTP_TIMEOUT_S: "5"

      # Orchestrator scoring weights
      W_QUEUE: "0.5"
      W_DISK: "0.15"
      W_RTT: "0.35"
      MIN_FREE_MB: "500"

      # Orchestrator API
      REDIS_HOST: "localhost"
      ORCHESTRATOR_API_KEY: "${ORCHESTRATOR_API_KEY}"

      # Cloud node endpoints (HTTPS)
      NODE_US_BASE: "https://orthanc-us:8042"
      NODE_US_USER: "${ORTHANC_USER}"
      NODE_US_PASS: "${ORTHANC_PASSWORD}"

      NODE_EU_BASE: "https://orthanc-eu:8042"
      NODE_EU_USER: "${ORTHANC_USER}"
      NODE_EU_PASS: "${ORTHANC_PASSWORD}"

      NODE_ASIA_BASE: "https://orthanc-asia:8042"
      NODE_ASIA_USER: "${ORTHANC_USER}"
      NODE_ASIA_PASS: "${ORTHANC_PASSWORD}"

      NODE_AF_BASE: "https://orthanc-af:8042"
      NODE_AF_USER: "${ORTHANC_USER}"
      NODE_AF_PASS: "${ORTHANC_PASSWORD}"

      REQUESTS_CA_BUNDLE: /certs/ca.pem

    volumes:
      - ./certs/orchestrator/server.crt:/certs/server.crt:ro
      - ./certs/orchestrator/server.key:/certs/server.key:ro
      - ./certs/ca.pem:/certs/ca.pem:ro

    depends_on:
      orthanc-us:
        condition: service_healthy
      orthanc-eu:
        condition: service_healthy
      orthanc-asia:
        condition: service_healthy
      orthanc-af:
        condition: service_healthy

    networks:
      - diomede-net
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - |
          import urllib.request, ssl, sys
          ctx = ssl.create_default_context(cafile='/certs/ca.pem')
          try:
            urllib.request.urlopen('https://localhost:8000/health', context=ctx, timeout=5)
            sys.exit(0)
          except Exception:
            sys.exit(1)
      interval: 10s
      timeout: 5s
      retries: 3

  # Edge Agent: Edge Orthanc + Forwarder Daemon
  edge-agent:
    build:
      context: .
      dockerfile: ./config/edge/Dockerfile
    container_name: edge-agent
    ports:
      - "8046:8042"  # Edge Orthanc REST API (HTTPS)
      - "4246:4242"  # Edge Orthanc DICOM
    env_file: .env
    volumes:
      - ./config/orthanc/edge.template.json:/etc/orthanc/orthanc.template.json:ro
      - ./certs/edge-agent:/etc/orthanc/certs:ro
      - ./certs/ca.pem:/certs/ca.pem:ro
      - orthanc-edge-data:/var/lib/orthanc/db
    environment:
      # Edge Orthanc configuration (HTTPS on localhost)
      EDGE_BASE: "https://localhost:8042"
      EDGE_USER: "${ORTHANC_USER}"
      EDGE_PASS: "${ORTHANC_PASSWORD}"

      # Orchestrator connection (HTTPS)
      ORCH_URL: "https://orchestrator:8000/get-best-node"
      ORCH_HEARTBEAT_URL: "https://orchestrator:8000/heartbeat"
      ORCHESTRATOR_API_KEY: "${ORCHESTRATOR_API_KEY}"

      # Cloud node credentials for Forwarder (HTTPS)
      NODE_US_BASE: "https://orthanc-us:8042"
      NODE_US_USER: "${ORTHANC_USER}"
      NODE_US_PASS: "${ORTHANC_PASSWORD}"

      NODE_EU_BASE: "https://orthanc-eu:8042"
      NODE_EU_USER: "${ORTHANC_USER}"
      NODE_EU_PASS: "${ORTHANC_PASSWORD}"

      NODE_ASIA_BASE: "https://orthanc-asia:8042"
      NODE_ASIA_USER: "${ORTHANC_USER}"
      NODE_ASIA_PASS: "${ORTHANC_PASSWORD}"

      NODE_AF_BASE: "https://orthanc-af:8042"
      NODE_AF_USER: "${ORTHANC_USER}"
      NODE_AF_PASS: "${ORTHANC_PASSWORD}"

      # Forwarder polling intervals
      POLL_INTERVAL_S: "5"
      PROBE_INTERVAL_S: "3600"

      REQUESTS_CA_BUNDLE: /certs/ca.pem

    depends_on:
      orchestrator:
        condition: service_healthy

    networks:
      - diomede-net
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - |
          import urllib.request, ssl, base64, os
          ctx = ssl.create_default_context(cafile='/etc/orthanc/certs/ca.pem')
          r = urllib.request.Request('https://localhost:8042/system')
          r.add_header('Authorization', 'Basic ' + base64.b64encode(
              (os.environ['ORTHANC_USER'] + ':' + os.environ['ORTHANC_PASSWORD']).encode()
          ).decode())
          urllib.request.urlopen(r, context=ctx)
      interval: 10s
      timeout: 5s
      retries: 3
