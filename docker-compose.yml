    entrypoint: /bin/sh
    command:
      - -c
      - |
        sed "s/\$${orthanc_user}/$$ORTHANC_USER/g; s/\$${orthanc_password}/$$ORTHANC_PASSWORD/g" \
          /etc/orthanc/orthanc.template.json > /tmp/orthanc.json
        exec Orthanc /tmp/orthanc.json
    volumes:
      - ./config/orthanc/eu.template.json:/etc/orthanc/orthanc.template.json:ro
      - ./certs/orthanc-eu:/etc/orthanc/certs:ro
      - orthanc-eu-data:/var/lib/orthanc/db
    cap_add:
      - NET_ADMIN
    networks:
