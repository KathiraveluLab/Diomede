        - |
          import urllib.request, ssl, base64, os
          ctx = ssl.create_default_context(cafile='/etc/orthanc/certs/ca.pem')
          r = urllib.request.Request('https://localhost:8042/system')
          r.add_header('Authorization', 'Basic ' + base64.b64encode(
