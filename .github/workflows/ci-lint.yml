name: Lint & Type Check

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install type-check deps
        run: pip install mypy types-redis pydantic fastapi httpx

      - name: mypy
        run: |
          for src_dir in src/orchestrator src/edge src/simulator; do
            if find "$src_dir" -name "*.py" -not -path "*/.mypy_cache/*" | grep -q .; then
              mypy "$src_dir"
            else
              echo "Skipping $src_dir (no Python files found)"
            fi
          done

      - name: Install hadolint
        run: |
          curl -sSL https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint && chmod +x /usr/local/bin/hadolint

      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files
        env:
          SKIP: no-commit-to-branch
